<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SecureBank - Login to your online banking account securely.">
    <title>SecureBank - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏦</text></svg>">
</head>
<body>
    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Login Page -->
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <!-- Logo & Header -->
                <div class="auth-header">
                    <div class="auth-logo">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="fill:none;stroke:white;">
                            <path d="M3 21h18"/>
                            <path d="M3 10h18"/>
                            <path d="M5 6l7-3 7 3"/>
                            <path d="M4 10v11"/>
                            <path d="M20 10v11"/>
                            <path d="M8 14v3"/>
                            <path d="M12 14v3"/>
                            <path d="M16 14v3"/>
                        </svg>
                    </div>
                    <h1>Welcome Back</h1>
                    <p>Sign in to access your SecureBank account</p>
                </div>

                <!-- Login Form -->
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <!-- Email -->
                    <div class="form-group">
                        <label for="loginEmail">Email Address</label>
                        <div class="form-input-wrapper">
                            <input type="email" id="loginEmail" class="form-input" placeholder="Enter your email" required autocomplete="email">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect width="20" height="16" x="2" y="4" rx="2"/>
                                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                            </svg>
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <div class="form-input-wrapper">
                            <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                            <button type="button" class="toggle-password" onclick="togglePassword('loginPassword', this)">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="btn btn-primary" id="loginBtn">
                        Sign In
                    </button>
                </form>

                <!-- Footer Links -->
                <div class="auth-divider">
                    <span>or</span>
                </div>

                <p class="auth-footer">
                    Don't have an account? <a href="register.html">Create Account</a>
                </p>
                <p class="auth-footer" style="margin-top: 12px;">
                    <a href="admin-login.html" style="font-size: 0.8rem; color: var(--gray-400);">Admin Login →</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Redirect if already logged in
        if (getToken() && getUser()) {
            const user = getUser();
            if (user.role === 'admin') {
                window.location.href = 'admin-dashboard.html';
            } else {
                window.location.href = 'dashboard.html';
            }
        }
    </script>
</body>
</html>
